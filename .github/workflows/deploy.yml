name: Deploy to Hostinger

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H srv1480943.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install Docker on server
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@srv1480943.hstgr.cloud << 'EOF'
            set -e
            apt-get update -qq
            apt-get install -y -qq curl git ufw openssl
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi
            echo "Docker: $(docker --version)"
          EOF

      - name: Configure firewall
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@srv1480943.hstgr.cloud << 'EOF'
            ufw --force reset
            ufw default deny incoming
            ufw default allow outgoing
            ufw allow 22/tcp
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw allow 8080/tcp
            ufw --force enable
            echo "Firewall OK"
          EOF

      - name: Clone / update repo
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@srv1480943.hstgr.cloud << 'EOF'
            set -e
            APP_DIR="/opt/store-builder"
            if [ -d "$APP_DIR/.git" ]; then
              echo "Pulling latest..."
              git -C "$APP_DIR" pull
            else
              echo "Cloning..."
              git clone https://github.com/monicavlzqz12-cyber/MV-MacroCreatorVmIM "$APP_DIR"
            fi
            echo "Code ready at $APP_DIR"
          EOF

      - name: Generate .env secrets
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@srv1480943.hstgr.cloud << 'EOF'
            APP_DIR="/opt/store-builder"
            DOMAIN="srv1480943.hstgr.cloud"
            if [ ! -f "$APP_DIR/.env" ]; then
              PG_PASS=$(openssl rand -hex 24)
              NA_SECRET=$(openssl rand -hex 32)
              ENC_KEY=$(openssl rand -hex 32)
              printf "POSTGRES_USER=storebuilder\n" > "$APP_DIR/.env"
              printf "POSTGRES_PASSWORD=%s\n" "$PG_PASS" >> "$APP_DIR/.env"
              printf "POSTGRES_DB=storebuilder\n" >> "$APP_DIR/.env"
              printf "DATABASE_URL=postgresql://storebuilder:%s@postgres:5432/storebuilder\n" "$PG_PASS" >> "$APP_DIR/.env"
              printf "NEXTAUTH_SECRET=%s\n" "$NA_SECRET" >> "$APP_DIR/.env"
              printf "NEXTAUTH_URL=https://%s\n" "$DOMAIN" >> "$APP_DIR/.env"
              printf "ENCRYPTION_KEY=%s\n" "$ENC_KEY" >> "$APP_DIR/.env"
              echo "=============================="
              echo ".env created. SAVE THESE:"
              echo "POSTGRES_PASSWORD=$PG_PASS"
              echo "NEXTAUTH_SECRET=$NA_SECRET"
              echo "ENCRYPTION_KEY=$ENC_KEY"
              echo "=============================="
            else
              echo ".env already exists, skipping."
            fi
          EOF

      - name: Obtain SSL certificate
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@srv1480943.hstgr.cloud << 'EOF'
            DOMAIN="srv1480943.hstgr.cloud"
            if [ ! -d "/etc/letsencrypt/live/$DOMAIN" ]; then
              docker stop certbot-nginx 2>/dev/null || true
              docker run --rm -d --name certbot-nginx \
                -p 80:80 \
                -v /opt/certbot-www:/var/www/certbot \
                nginx:alpine \
                sh -c "mkdir -p /var/www/certbot && nginx -g 'daemon off;'"
              sleep 3
              docker run --rm \
                -v /etc/letsencrypt:/etc/letsencrypt \
                -v /opt/certbot-www:/var/www/certbot \
                certbot/certbot certonly \
                --webroot -w /var/www/certbot \
                -d "$DOMAIN" \
                --non-interactive --agree-tos \
                --email "admin@$DOMAIN" \
                --no-eff-email && echo "SSL OK" || echo "SSL failed - will retry manually"
              docker stop certbot-nginx 2>/dev/null || true
            else
              echo "Certificate already exists."
            fi
          EOF

      - name: Build and start services
        timeout-minutes: 20
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 root@srv1480943.hstgr.cloud << 'EOF'
            set -e
            cd /opt/store-builder
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d postgres
            sleep 5
            # Run migrations
            docker compose -f docker-compose.prod.yml run --rm \
              admin sh -c "npx prisma migrate deploy --schema packages/database/prisma/schema.prisma" || true
            # Seed initial data
            docker compose -f docker-compose.prod.yml run --rm \
              admin sh -c "node packages/database/src/seed.js" || true
            # Start everything
            docker compose -f docker-compose.prod.yml up -d
            sleep 5
            docker compose -f docker-compose.prod.yml ps
          EOF

      - name: Done
        run: |
          echo "======================================="
          echo " Deployment complete!"
          echo " Admin:      https://srv1480943.hstgr.cloud"
          echo " Storefront: http://srv1480943.hstgr.cloud:8080"
          echo " Login:      admin@example.com / admin123"
          echo "======================================="
