version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storebuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-storebuilder}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storebuilder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storebuilder}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storebuilder}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://admin.srv1480943.hstgr.cloud}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storebuilder}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storebuilder}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - admin
      - storefront
    networks:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"

  migrate:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    command: >
      sh -c "cd /app && node -e \"
        const { execSync } = require('child_process');
        execSync('npx prisma migrate deploy --schema packages/database/prisma/schema.prisma', { stdio: 'inherit' });
      \""
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storebuilder}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storebuilder}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - migrate

volumes:
  pgdata:
  certbot_www:
  certbot_certs:

networks:
  internal:
    internal: true
  web:
