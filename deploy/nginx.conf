events {
  worker_connections 1024;
}

http {
  server_tokens off;
  client_max_body_size 10M;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=checkout:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name srv1480943.hstgr.cloud;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Admin — HTTPS
  server {
    listen 443 ssl;
    server_name srv1480943.hstgr.cloud;

    ssl_certificate     /etc/letsencrypt/live/srv1480943.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1480943.hstgr.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — long cache
    location /_next/static/ {
      proxy_pass http://admin:3000;
      proxy_cache_valid 200 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /uploads/ {
      proxy_pass http://admin:3000;
      add_header Cache-Control "public, max-age=86400";
    }

    location / {
      limit_req zone=general burst=20 nodelay;
      proxy_pass http://admin:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # Storefront — port 8080 (HTTP only, or add another domain/subdomain)
  server {
    listen 8080;
    server_name srv1480943.hstgr.cloud;

    location /_next/static/ {
      proxy_pass http://storefront:3001;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
      limit_req zone=general burst=30 nodelay;
      proxy_pass http://storefront:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://storefront:3001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
